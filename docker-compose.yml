# Single-PC stack for the stateful Videonizer backend.
#
# Default deployment target: /appdata/storage/videonizer/{pg,minio} on the
# host. Override DATA_ROOT to relocate.
#
# Bring-up:
#   cp .env.example .env   # then fill secrets
#   docker compose up -d postgres minio
#
# The app itself runs from host venv (`python -m app.main`) by default —
# this compose file only manages the stateful infra.

x-data-root: &data-root ${DATA_ROOT:-/appdata/storage/videonizer}

services:
  postgres:
    image: postgres:16-alpine
    container_name: videonizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videonizer}
      POSTGRES_USER: ${POSTGRES_USER:-videonizer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Speed up bulk inserts a touch on this VM's spinning vmware disk.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${DATA_ROOT:-/appdata/storage/videonizer}/pg:/var/lib/postgresql/data
    ports:
      # Host-only bind: never expose to the network.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-videonizer} -d ${POSTGRES_DB:-videonizer}"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: videonizer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      - ${DATA_ROOT:-/appdata/storage/videonizer}/minio:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # admin console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5

  # One-shot bucket bootstrapper. Idempotent.
  minio-init:
    image: minio/mc:latest
    container_name: videonizer-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_BUCKET: ${S3_BUCKET:-videonizer}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$S3_BUCKET" &&
        echo "bucket $$S3_BUCKET ready"
    restart: "no"
